<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFOSPOT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff8ee;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: white;
  position: fixed;
  width: 100%;
  top: 0;
}

button {
  cursor: pointer;
}

.hero {
  margin-top: 100px;
  padding: 40px;
}

.btn {
  background: #E8390E;
  color: white;
  padding: 10px 20px;
  border: none;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: white;
  padding: 30px;
  border-radius: 10px;
}

.mobile-menu {
  display: none;
}
.mobile-menu.open {
  display: block;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>INFOSPOT</div>

  <div>
    <button onclick="openModal()">Sign In</button>
    <button onclick="toggleDark()">🌙</button>
    <button onclick="toggleMenu()">☰</button>
  </div>
</nav>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="mobile-menu">
  <button onclick="openModal()">Sign In</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Protect Your Art</h1>
  <button class="btn" onclick="openModal()">Start Free</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay">
  <div class="modal">
    <button onclick="closeModal()">X</button>

    <h2>Sign In</h2>

    <form onsubmit="loginUser(event)">
      <input id="email" type="email" placeholder="Email" required><br><br>
      <input id="password" type="password" placeholder="Password" required><br><br>
      <button class="btn">Login</button>
    </form>
  </div>
</div>

<!-- SCRIPT -->
<script>

// ===== SUPABASE =====
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

let currentUser = null;

// ===== MODAL =====
function openModal() {
  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

// ===== DARK MODE =====
function toggleDark() {
  document.body.classList.toggle("dark");
}

// ===== MOBILE MENU =====
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("open");
}

// ===== LOGIN =====
async function loginUser(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password,
  });

  if (error) {
    alert(error.message);
    return;
  }

  currentUser = data.user;
  alert("Login successful!");
  closeModal();
}

// ===== CHECK USER =====
async function checkUser() {
  const { data } = await supabase.auth.getUser();
  currentUser = data.user;
}

checkUser();

</script>

</body>
</html>
