<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INFOSPOT INC — Protect Your Art. Own Your Future.</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Cabinet+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();
</script>

<style>

/* YOUR ENTIRE STYLE SECTION REMAINS EXACTLY THE SAME */

</style>
</head>

<body>

<!-- YOUR WHOLE PAGE CONTENT REMAINS THE SAME -->

<!-- SUCCESS TOAST -->
<div id="toast" style="
position:fixed;bottom:30px;left:50%;
transform:translateX(-50%) translateY(100px);
background:#2D6A4F;color:white;
padding:14px 28px;border-radius:50px;
font-weight:700;font-size:0.9rem;
z-index:9999;transition:transform 0.3s ease;
pointer-events:none;white-space:nowrap;
"></div>

<script>

function openModal(tab){
event && event.preventDefault();
document.getElementById('modalOverlay').classList.add('open');
switchTab(tab || 'signup');
}

function closeModal(){
document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e){
if(e.target === document.getElementById('modalOverlay')) closeModal();
}

function switchTab(tab){
const isSignup = tab === 'signup';
document.getElementById('tabSignup').classList.toggle('active', isSignup);
document.getElementById('tabSignin').classList.toggle('active', !isSignup);
document.getElementById('formSignup').style.display = isSignup ? 'block' : 'none';
document.getElementById('formSignin').style.display = isSignup ? 'none' : 'block';
document.getElementById('modalTitle').textContent = isSignup ? 'Join INFOSPOT' : 'Welcome Back';
}

async function handleSignup(){

const name = document.getElementById('signupName').value.trim();
const email = document.getElementById('signupEmail').value.trim();
const talent = document.getElementById('signupTalent').value;

if(!name || !email || !talent){
showToast("⚠️ Please complete all fields");
return;
}

/* SEND EMAIL AUTHENTICATION */

try{

await emailjs.send(
"service_9qd7rnc",
"YOUR_TEMPLATE_ID",
{
user_name:name,
user_email:email,
user_talent:talent
}
);

showToast("📩 Verification email sent!");

}catch(err){

showToast("❌ Email failed to send");
console.error(err);

}

/* SAVE TO GOOGLE FORM */

const base='https://docs.google.com/forms/d/e/1FAIpQLSfFT5cC3KDhDXVlU5r8rpFfRVuhqQ_TlKf9fcCx6AbaYxTDtA/formResponse';

const params=new URLSearchParams({
'entry.274773365':name,
'entry.26547687':email,
'entry.937268460':talent,
'entry.2033618231':'Free'
});

const iframe=document.createElement('iframe');
iframe.style.display='none';
iframe.name='hidden_iframe';
document.body.appendChild(iframe);

const form=document.createElement('form');
form.method='POST';
form.action=base;
form.target='hidden_iframe';

params.forEach((val,key)=>{
const input=document.createElement('input');
input.type='hidden';
input.name=key;
input.value=val;
form.appendChild(input);
});

document.body.appendChild(form);
form.submit();

closeModal();

showToast("🎉 Welcome to INFOSPOT!");

setTimeout(()=>{
window.location.href="infospot-app.html";
},1500);

}

function handleSignin(){
closeModal();
showToast("✅ Signed in successfully");
setTimeout(()=>{
window.location.href="infospot-app.html";
},1200);
}

function showToast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.style.transform='translateX(-50%) translateY(0)';
setTimeout(()=>{
t.style.transform='translateX(-50%) translateY(100px)';
},3500);
}

const steps=document.querySelectorAll('.step');

const observer=new IntersectionObserver((entries)=>{
entries.forEach((entry,i)=>{
if(entry.isIntersecting){
setTimeout(()=>{
entry.target.classList.add('visible');
},i*120);
}
});
},{threshold:0.2});

steps.forEach(s=>observer.observe(s));

document.addEventListener('keydown',e=>{
if(e.key==="Escape") closeModal();
});

</script>

</body>
</html>
