<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INFOSPOT INC — Protect Your Art. Own Your Future.</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Cabinet+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();
</script>

<style>

body{
font-family:'Cabinet Grotesk',sans-serif;
margin:0;
background:#FFF8EE;
color:#1A0A00;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:white;
border-bottom:1px solid #eee;
}

.logo{
font-family:'Fraunces',serif;
font-size:24px;
font-weight:900;
}

.hero{
padding:120px 40px;
text-align:center;
}

.hero h1{
font-family:'Fraunces',serif;
font-size:56px;
margin-bottom:20px;
}

.hero p{
max-width:500px;
margin:auto;
opacity:.7;
}

.btn{
background:#E8390E;
color:white;
padding:14px 28px;
border:none;
border-radius:40px;
font-weight:700;
cursor:pointer;
margin-top:30px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s;
}

.modal.open{
opacity:1;
pointer-events:auto;
}

.modal-box{
background:white;
padding:40px;
border-radius:16px;
width:380px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#2D6A4F;
color:white;
padding:14px 28px;
border-radius:50px;
font-weight:700;
transition:.3s;
}

</style>
</head>

<body>

<nav>
<div class="logo">INFOSPOT.</div>
<button class="btn" onclick="openModal()">Join Free</button>
</nav>

<section class="hero">

<h1>Protect Your Art.<br>Own Your Future.</h1>

<p>
INFOSPOT INC helps African creatives protect their work,
connect with collaborators, and grow their careers.
</p>

<button class="btn" onclick="openModal()">Start for Free</button>

</section>


<!-- SIGNUP MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h2>Create Account</h2>

<input id="name" placeholder="Full Name">

<input id="email" placeholder="Email">

<select id="talent">
<option value="">Talent type</option>
<option>Musician</option>
<option>Visual Artist</option>
<option>Producer</option>
<option>Photographer</option>
</select>

<button class="btn" onclick="signup()">Create Account</button>

</div>

</div>


<div class="toast" id="toast"></div>


<script>

function openModal(){
document.getElementById("modal").classList.add("open")
}

function closeModal(){
document.getElementById("modal").classList.remove("open")
}


async function signup(){

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const talent=document.getElementById("talent").value

if(!name || !email || !talent){
toast("Please complete all fields")
return
}

try{

await emailjs.send(
"service_9qd7rnc",
"YOUR_TEMPLATE_ID",
{
user_name:name,
user_email:email,
user_talent:talent
})

}catch(e){
console.log(e)
}


const formURL="https://docs.google.com/forms/d/e/1FAIpQLSfFT5cC3KDhDXVlU5r8rpFfRVuhqQ_TlKf9fcCx6AbaYxTDtA/formResponse"

const params=new URLSearchParams({
'entry.274773365':name,
'entry.26547687':email,
'entry.937268460':talent,
'entry.2033618231':'Free'
})

fetch(formURL,{
method:"POST",
mode:"no-cors",
body:params
})

toast("Welcome to INFOSPOT 🎉")

setTimeout(()=>{
window.location="infospot-app.html"
},1500)

}

function toast(msg){

const t=document.getElementById("toast")

t.innerText=msg
t.style.transform="translateX(-50%) translateY(0)"

setTimeout(()=>{
t.style.transform="translateX(-50%) translateY(100px)"
},3000)

}

</script>

</body>
</html>
